<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAVFORM — Audio Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;400;700&display=swap" rel="stylesheet" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #a855f7;
            --secondary: #06b6d4;
            --bg: #050507;
            --panel: rgba(10, 10, 16, 0.85);
            --border: rgba(168, 85, 247, 0.18);
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'Space Mono', monospace;
            --display: 'Unbounded', sans-serif;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            overflow: hidden;
        }

        /* ── Canvas ── */
        #canvas-container {
            position: fixed; inset: 0;
            z-index: 0;
        }

        /* ── Header ── */
        #header {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px;
            background: linear-gradient(to bottom, rgba(5,5,7,0.95) 60%, transparent);
            pointer-events: none;
        }

        #header .logo {
            font-family: var(--display);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            pointer-events: all;
        }

        #track-info {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-align: right;
        }

        #track-info .track-name {
            color: var(--text);
            font-size: 0.85rem;
            font-family: var(--display);
            font-weight: 300;
        }

        /* ── Upload Zone ── */
        #upload-overlay {
            position: fixed; inset: 0;
            z-index: 20;
            display: flex; align-items: center; justify-content: center;
            background: rgba(5, 5, 7, 0.92);
            backdrop-filter: blur(8px);
        }

        #upload-zone {
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 64px 80px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            position: relative;
            overflow: hidden;
        }

        #upload-zone::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, rgba(168,85,247,0.06) 0%, transparent 70%);
        }

        #upload-zone:hover, #upload-zone.drag-over {
            border-color: var(--primary);
            background: rgba(168, 85, 247, 0.05);
        }

        #upload-zone .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
            opacity: 0.6;
        }

        #upload-zone h2 {
            font-family: var(--display);
            font-weight: 300;
            font-size: 1.4rem;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        #upload-zone p {
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
        }

        #audioFile { display: none; }

        /* ── Sidebar Panel ── */
        #sidebar {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: 280px;
            z-index: 10;
            display: flex; flex-direction: column;
            background: var(--panel);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(20px);
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        #sidebar.open { transform: translateX(0); }

        #sidebar::-webkit-scrollbar { width: 3px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .sidebar-header {
            padding: 22px 20px 14px;
            border-bottom: 1px solid var(--border);
            font-family: var(--display);
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: space-between;
        }

        #closeBtn {
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 1.1rem; padding: 2px;
        }
        #closeBtn:hover { color: var(--text); }

        .section {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        /* Controls */
        .control-row {
            margin-bottom: 14px;
        }

        label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        label .value {
            color: var(--secondary);
            font-size: 0.65rem;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        input[type="color"] {
            width: 100%;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: none;
            cursor: pointer;
            padding: 2px;
        }

        select {
            width: 100%;
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.72rem;
            padding: 7px 10px;
            outline: none;
            cursor: pointer;
        }

        select:focus { border-color: var(--primary); }

        .toggle-row {
            display: flex; align-items: center; justify-content: space-between;
        }

        .toggle {
            position: relative; width: 36px; height: 20px;
        }

        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            left: 3px; top: 3px;
            background: var(--muted);
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .toggle input:checked + .toggle-slider { background: rgba(168, 85, 247, 0.3); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--primary); }

        /* Preset save */
        #presetName {
            width: 100%;
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.72rem;
            padding: 7px 10px;
            outline: none;
            margin-bottom: 10px;
        }

        #presetName:focus { border-color: var(--primary); }
        #presetName::placeholder { color: var(--muted); }

        #saveBtn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 3px;
            color: white;
            font-family: var(--display);
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.14em;
            padding: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.2s, transform 0.1s;
        }

        #saveBtn:hover { opacity: 0.88; }
        #saveBtn:active { transform: scale(0.98); }

        /* Preset list */
        .preset-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: opacity 0.15s;
        }

        .preset-item:hover { opacity: 0.7; }

        .preset-name {
            font-size: 0.72rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .preset-id {
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.08em;
        }

        /* ── Toggle sidebar button ── */
        #toggleBtn {
            position: fixed; top: 50%; right: 0;
            transform: translateY(-50%);
            z-index: 15;
            background: var(--panel);
            border: 1px solid var(--border);
            border-right: none;
            border-radius: 4px 0 0 4px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            padding: 14px 8px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transition: color 0.2s, border-color 0.2s;
            backdrop-filter: blur(10px);
        }

        #toggleBtn:hover { color: var(--primary); border-color: var(--primary); }

        /* ── Bottom bar ── */
        #bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 10;
            padding: 16px 28px;
            background: linear-gradient(to top, rgba(5,5,7,0.9) 60%, transparent);
            display: flex; align-items: center; gap: 16px;
            pointer-events: none;
        }

        #bottom-bar .file-label {
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        #progress-bar {
            flex: 1;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 1px;
            width: 0%;
            transition: width 0.1s linear;
        }

        #time-display {
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            min-width: 60px;
            text-align: right;
        }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px);
            z-index: 100;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 10px 20px;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            backdrop-filter: blur(12px);
            white-space: nowrap;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: rgba(6, 182, 212, 0.4); color: var(--secondary); }
        .toast.error { border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }

        /* ── Frequency bars overlay ── */
        #freq-canvas {
            position: fixed; bottom: 36px; left: 0; right: 0;
            height: 80px;
            z-index: 5;
            opacity: 0.35;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Three.js canvas -->
<div id="canvas-container"></div>

<!-- Frequency bars -->
<canvas id="freq-canvas"></canvas>

<!-- Upload screen -->
<div id="upload-overlay">
    <div id="upload-zone">
        <span class="icon">◈</span>
        <h2>Drop audio here</h2>
        <p>MP3 · WAV · FLAC · OGG</p>
        <input type="file" id="audioFile" accept="audio/*" />
    </div>
</div>

<!-- Header -->
<div id="header">
    <div class="logo">WAVFORM</div>
    <div id="track-info" style="display:none">
        <div class="track-name" id="track-name">—</div>
        <div id="track-meta"></div>
    </div>
</div>

<!-- Toggle sidebar button -->
<button id="toggleBtn">CONTROLS</button>

<!-- Sidebar -->
<div id="sidebar">
    <div class="sidebar-header">
        Controls
        <button id="closeBtn">✕</button>
    </div>

    <div class="section">
        <div class="section-title">Geometry</div>
        <div class="control-row">
            <label for="geometrySelect">Shape</label>
            <select id="geometrySelect">
                <option value="sphere">Sphere</option>
                <option value="torus">Torus Knot</option>
                <option value="icosahedron">Icosahedron</option>
                <option value="particles">Particles</option>
            </select>
        </div>
        <div class="control-row toggle-row">
            <label for="wireframeToggle" style="margin:0">Wireframe</label>
            <label class="toggle">
                <input type="checkbox" id="wireframeToggle" />
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Color</div>
        <div class="control-row">
            <label for="colorPrimary">Primary</label>
            <input type="color" id="colorPrimary" value="#a855f7" />
        </div>
        <div class="control-row">
            <label for="colorSecondary">Secondary</label>
            <input type="color" id="colorSecondary" value="#06b6d4" />
        </div>
    </div>

    <div class="section">
        <div class="section-title">Motion</div>
        <div class="control-row">
            <label for="bloomStrength">Bloom <span class="value">1.50</span></label>
            <input type="range" id="bloomStrength" min="0" max="3" step="0.05" value="1.5" />
        </div>
        <div class="control-row">
            <label for="sensitivity">Sensitivity <span class="value">1.20</span></label>
            <input type="range" id="sensitivity" min="0.2" max="3" step="0.05" value="1.2" />
        </div>
        <div class="control-row">
            <label for="rotationSpeed">Rotation <span class="value">0.30</span></label>
            <input type="range" id="rotationSpeed" min="0" max="2" step="0.05" value="0.3" />
        </div>
    </div>

    <div class="section">
        <div class="section-title">Save Preset</div>
        <input type="text" id="presetName" placeholder="Preset name…" maxlength="40" />
        <button id="saveBtn">Save &amp; Copy Link</button>
    </div>

    <div class="section" style="flex:1">
        <div class="section-title">Saved Presets</div>
        <div id="presetList"></div>
    </div>
</div>

<!-- Bottom bar -->
<div id="bottom-bar">
    <span class="file-label" id="file-label">No file loaded</span>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <span id="time-display">0:00</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
    import { initScene, buildScene, loadAudio } from "./visualizer.js";
    import { initControls, currentSettings, applyPreset, showToast } from "./controls.js";

    // Init Three.js scene
    initScene();
    buildScene(currentSettings);

    // Init controls — rebuild scene on every change
    initControls((settings) => {
        buildScene(settings);
    });

    // Listen for preset loads from sidebar list clicks
    document.addEventListener("loadPreset", (e) => {
        applyPreset(e.detail, (settings) => buildScene(settings));
    });

    // Upload zone
    const uploadOverlay = document.getElementById("upload-overlay");
    const uploadZone    = document.getElementById("upload-zone");
    const audioFileInput = document.getElementById("audioFile");

    uploadZone.addEventListener("click", () => audioFileInput.click());

    uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("drag-over");
    });

    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));

    uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("audio/")) handleFile(file);
    });

    audioFileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    });

    let duration = 0;
    let startTime = 0;

    async function handleFile(file) {
        uploadOverlay.style.display = "none";
        document.getElementById("track-info").style.display = "block";
        document.getElementById("track-name").textContent = file.name.replace(/\.[^.]+$/, "");
        document.getElementById("file-label").textContent = file.name;
        document.getElementById("track-meta").textContent =
            `${(file.size / 1048576).toFixed(1)} MB`;

        duration = await loadAudio(file);
        startTime = performance.now() / 1000;
        updateProgress();
    }

    function updateProgress() {
        const elapsed = performance.now() / 1000 - startTime;
        const pct = Math.min((elapsed / duration) * 100, 100);
        document.getElementById("progress-fill").style.width = pct + "%";

        const mins = Math.floor(elapsed / 60);
        const secs = Math.floor(elapsed % 60).toString().padStart(2, "0");
        document.getElementById("time-display").textContent = `${mins}:${secs}`;

        if (elapsed < duration) requestAnimationFrame(updateProgress);
    }

    // Frequency bars on 2D canvas
    const freqCanvas = document.getElementById("freq-canvas");
    const fCtx = freqCanvas.getContext("2d");

    function drawFreqBars() {
        requestAnimationFrame(drawFreqBars);
        freqCanvas.width  = window.innerWidth;
        freqCanvas.height = 80;

        // Access analyser via window (set in visualizer.js)
        if (!window._analyserRef) return;
        const arr = new Uint8Array(window._analyserRef.frequencyBinCount);
        window._analyserRef.getByteFrequencyData(arr);

        const barW = freqCanvas.width / arr.length * 2.5;
        const grad = fCtx.createLinearGradient(0, 0, freqCanvas.width, 0);
        grad.addColorStop(0, currentSettings.colorPrimary);
        grad.addColorStop(1, currentSettings.colorSecondary);
        fCtx.fillStyle = grad;

        let x = 0;
        for (let i = 0; i < arr.length; i++) {
            const h = (arr[i] / 255) * 80;
            fCtx.fillRect(x, 80 - h, barW - 1, h);
            x += barW;
        }
    }

    drawFreqBars();

    // Sidebar toggle
    const sidebar   = document.getElementById("sidebar");
    const toggleBtn = document.getElementById("toggleBtn");
    const closeBtn  = document.getElementById("closeBtn");

    toggleBtn.addEventListener("click", () => sidebar.classList.toggle("open"));
    closeBtn.addEventListener("click",  () => sidebar.classList.remove("open"));
</script>
</body>
</html>
